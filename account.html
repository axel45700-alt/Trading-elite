<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon compte — Trading Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a1a;
            --bg-card: #161633;
            --gold: #e2b93b;
            --text: #ffffff;
            --text-muted: #8888aa;
            --border: #2a2a4a;
            --green: #27ae60;
            --red: #e74c3c;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }
        nav {
            max-width: 1000px;
            margin: 0 auto 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.3rem; font-weight: 900; text-decoration: none; color: var(--text); }
        .logo span { color: var(--gold); }
        .logout-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s;
        }
        .logout-btn:hover { opacity: 0.8; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 { font-size: 2rem; margin-bottom: 2rem; }
        h1 span { color: var(--gold); }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .info-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 10px;
        }
        .info-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .info-value {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }
        .badge-gratuit {
            background: rgba(39,174,96,0.2);
            color: var(--green);
            border: 1px solid var(--green);
        }
        .badge-abonne {
            background: rgba(226,185,59,0.2);
            color: var(--gold);
            border: 1px solid var(--gold);
        }
        .badge-expire {
            background: rgba(231,76,60,0.2);
            color: var(--red);
            border: 1px solid var(--red);
        }

        .action-section {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        .btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary {
            background: var(--gold);
            color: #000;
        }
        .btn-primary:hover {
            background: #c9a230;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }
        .btn-secondary:hover {
            background: rgba(226,185,59,0.1);
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .error-msg {
            background: rgba(231,76,60,0.1);
            border: 1px solid var(--red);
            color: #ff6b6b;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }
        .footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .footer a {
            color: var(--gold);
            text-decoration: none;
            margin: 0 0.5rem;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">TRADING <span>ELITE</span></a>
    <button class="logout-btn" id="logoutBtn">Se déconnecter</button>
</nav>

<div class="container">
    <h1>Mon <span>compte</span></h1>

    <div id="loadingMsg" class="loading">Chargement de ton compte...</div>
    <div id="errorSection" style="display:none;"></div>
    <div id="accountContent" style="display:none;">
        <div class="card">
            <h2 style="margin-bottom:1.5rem;">Infos personnelles</h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Nom</div>
                    <div class="info-value" id="nomValue">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Prénom</div>
                    <div class="info-value" id="prenomValue">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Email</div>
                    <div class="info-value" id="emailValue" style="font-size:1rem;">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Téléphone</div>
                    <div class="info-value" id="telValue">-</div>
                </div>
            </div>
        </div>

        <!-- Card VIP -->
        <div class="card">
            <h2 style="margin-bottom:1.5rem;">Abonnement VIP</h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Statut</div>
                    <div id="statutValue">
                        <span class="status-badge badge-gratuit">Semaine gratuite</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">Jours restants</div>
                    <div class="info-value" id="joursRestants">-</div>
                </div>
            </div>

            <div class="action-section" id="actionSection">
                <button id="paymentBtn" class="btn btn-primary">
                    Passer à l'abonnement VIP (60€)
                </button>
            </div>
        </div>

        <!-- Card Robot -->
        <div class="card">
            <h2 style="margin-bottom:1.5rem;">Robot de Trading</h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Statut</div>
                    <div id="robotStatutValue">
                        <span class="status-badge badge-expire">Non activé</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">Accès</div>
                    <div class="info-value" id="robotAccesValue">-</div>
                </div>
            </div>

            <div id="robotLicenseSection" style="display:none; background:rgba(226,185,59,0.1); border:1px solid var(--gold); padding:1.5rem; border-radius:10px; margin-top:1.5rem;">
                <div class="info-label" style="margin-bottom:0.5rem;">Clé de licence Robot</div>
                <div style="display:flex; gap:1rem; align-items:center;">
                    <div id="robotLicenseKeyValue" style="font-family:monospace; font-weight:700; color:var(--gold); word-break:break-all; flex:1;"></div>
                    <button id="copyRobotLicenseBtn" class="btn" style="background:var(--gold); color:#000; flex:0.3; padding:0.5rem;">Copier</button>
                </div>
            </div>

            <div class="action-section" id="robotActionSection">
                <button id="robotPaymentBtn" class="btn btn-primary">
                    Acheter le Robot (60€)
                </button>
            </div>
        </div>

        <div class="footer">
            <a href="index.html">← Retour au site</a> |
            <a href="https://www.tiktok.com/@Dv.xausnip" target="_blank">TikTok</a> |
            <a href="https://www.snapchat.com/add/diegsxau" target="_blank">Snapchat</a>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-functions.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdj78TKok5MVcUT5WtqCfCV_kZR7SJWxY",
  authDomain: "trading-elite.firebaseapp.com",
  projectId: "trading-elite",
  storageBucket: "trading-elite.firebasestorage.app",
  messagingSenderId: "261674541691",
  appId: "1:261674541691:web:27588043f232f8b152b8de"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const functions = getFunctions(app);

const loadingMsg = document.getElementById('loadingMsg');
const errorSection = document.getElementById('errorSection');
const accountContent = document.getElementById('accountContent');
const logoutBtn = document.getElementById('logoutBtn');

logoutBtn.addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = 'login.html';
});

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }

    try {
        // Récupérer les infos de l'utilisateur
        const q = query(collection(db, 'users'), where('uid', '==', user.uid));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
            showError('Utilisateur non trouvé');
            return;
        }

        const userData = snapshot.docs[0].data();
        const docRef = snapshot.docs[0].ref;

        // Afficher les infos
        document.getElementById('nomValue').textContent = userData.nom || '-';
        document.getElementById('prenomValue').textContent = userData.prenom || '-';
        document.getElementById('emailValue').textContent = user.email;
        document.getElementById('telValue').textContent = userData.telephone || '-';

        // Calculer et afficher le prix dynamique
        const nombre_Filleul = userData.nombre_Filleul || 0;
        const reduction = Math.min(nombre_Filleul, 5) * 16;
        const prixFinal = Math.max(0, 78 - reduction);

        // Bouton de paiement
        const paymentBtn = document.getElementById('paymentBtn');
        const prixText = prixFinal === 0 ? 'Passer à l\'abonnement VIP (GRATUIT)' : `Passer à l'abonnement VIP (${prixFinal}€)`;
        paymentBtn.textContent = prixText;

        paymentBtn.addEventListener('click', async () => {
            paymentBtn.disabled = true;
            paymentBtn.textContent = 'Redirection vers Stripe...';
            try {
                const createCheckoutSession = httpsCallable(functions, 'createCheckoutSession');
                const result = await createCheckoutSession();
                window.location.href = result.data.url;
            } catch (error) {
                alert('Erreur: ' + error.message);
                paymentBtn.disabled = false;
                paymentBtn.textContent = prixText;
            }
        });

        // ===== SECTION VIP =====
        if (userData.abonne) {
            document.getElementById('statutValue').innerHTML = '<span class="status-badge badge-abonne">Abonné VIP ✓</span>';
            document.getElementById('joursRestants').textContent = '∞';
            document.getElementById('actionSection').innerHTML = '<p style="color:var(--green); flex:1;">✓ Abonnement actif</p><button id="unsubscribeBtn" class="btn" style="background:var(--red); color:white; flex:0.5;">Se désabonner</button>';

            if (userData.vipLicenseKey) {
                document.getElementById('vipLicenseSection').style.display = 'block';
                document.getElementById('vipLicenseKeyValue').textContent = userData.vipLicenseKey;
                document.getElementById('copyVipLicenseBtn').addEventListener('click', () => {
                    navigator.clipboard.writeText(userData.vipLicenseKey);
                    alert('Clé VIP copiée !');
                });
            }

            // Afficher le lien Telegram si disponible
            if (userData.telegramInviteLink) {
                const actionSection = document.getElementById('actionSection');
                const telegramDiv = document.createElement('div');
                telegramDiv.style = 'background:rgba(39,174,96,0.1); border:1px solid var(--green); padding:1.5rem; border-radius:10px; margin-top:1.5rem;';
                telegramDiv.innerHTML = `
                    <div class="info-label" style="margin-bottom:0.5rem;">Groupe Telegram VIP</div>
                    <a href="${userData.telegramInviteLink}" target="_blank" class="btn btn-primary" style="display:inline-block; text-decoration:none; padding:0.7rem 1.5rem;">
                        Rejoindre le groupe Telegram →
                    </a>`;
                actionSection.parentNode.insertBefore(telegramDiv, actionSection);
            }

            document.getElementById('unsubscribeBtn').addEventListener('click', async () => {
                if (confirm('Es-tu sûr de vouloir te désabonner ? Ton abonnement restera actif jusqu\'à la fin de la période en cours.')) {
                    try {
                        const cancelSubscription = httpsCallable(functions, 'cancelSubscription');
                        await cancelSubscription();
                        alert('Ton abonnement sera annulé à la fin de la période en cours.');
                        location.reload();
                    } catch (error) {
                        alert('Erreur lors de la désinscription: ' + error.message);
                    }
                }
            });
        } else if (userData.semaineGratuite) {
            const dateCreation = userData.dateSemaineGratuite.toDate ? userData.dateSemaineGratuite.toDate() : new Date(userData.dateSemaineGratuite);
            const joursEcoules = Math.floor((new Date() - dateCreation) / (1000 * 60 * 60 * 24));
            const joursRestants = Math.max(0, 7 - joursEcoules);
            document.getElementById('joursRestants').textContent = joursRestants + ' jour(s)';
            if (joursRestants === 0) {
                document.getElementById('statutValue').innerHTML = '<span class="status-badge badge-expire">Semaine gratuite expirée</span>';
            }
        }

        // ===== SECTION ROBOT =====
        if (userData.Robot_En_cours) {
            document.getElementById('robotStatutValue').innerHTML = '<span class="status-badge badge-abonne">Robot actif ✓</span>';
            document.getElementById('robotAccesValue').textContent = 'Actif';
            document.getElementById('robotActionSection').innerHTML = '<p style="color:var(--green); flex:1;">✓ Robot actif</p><button id="cancelRobotBtn" class="btn" style="background:var(--red); color:white; flex:0.5;">Se désabonner</button>';

            if (userData.robotLicenseKey) {
                document.getElementById('robotLicenseSection').style.display = 'block';
                document.getElementById('robotLicenseKeyValue').textContent = userData.robotLicenseKey;
                document.getElementById('copyRobotLicenseBtn').addEventListener('click', () => {
                    navigator.clipboard.writeText(userData.robotLicenseKey);
                    alert('Clé Robot copiée !');
                });
            }

            document.getElementById('cancelRobotBtn').addEventListener('click', async () => {
                if (confirm('Es-tu sûr ? La licence Robot sera supprimée à la fin de la période.')) {
                    try {
                        const cancelRobotSubscription = httpsCallable(functions, 'cancelRobotSubscription');
                        await cancelRobotSubscription();
                        alert('Abonnement Robot annulé en fin de période.');
                        location.reload();
                    } catch (error) {
                        alert('Erreur: ' + error.message);
                    }
                }
            });
        } else {
            document.getElementById('robotAccesValue').textContent = 'Non acheté';
            const robotPaymentBtn = document.getElementById('robotPaymentBtn');
            robotPaymentBtn.addEventListener('click', () => {
                const email = user.email;
                const robotLink = `https://buy.stripe.com/test_4gM6oHdyl0FX5W1g9ngIo01?prefilled_email=${encodeURIComponent(email)}`;
                window.location.href = robotLink;
            });
        }

        loadingMsg.style.display = 'none';
        accountContent.style.display = 'block';
    } catch (error) {
        showError('Erreur lors du chargement de ton compte: ' + error.message);
    }
});

function showError(msg) {
    errorSection.innerHTML = '<div class="error-msg">' + msg + '</div>';
    errorSection.style.display = 'block';
    loadingMsg.style.display = 'none';
}
</script>

</body>
</html>
