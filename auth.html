<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte — Trading Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a1a;
            --bg-card: #161633;
            --gold: #e2b93b;
            --text: #ffffff;
            --text-muted: #8888aa;
            --border: #2a2a4a;
            --green: #27ae60;
            --red: #e74c3c;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            width: 100%;
            max-width: 450px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-link {
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }
        .logo-text {
            font-size: 1.3rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
        }
        .logo-text span { color: var(--gold); }
        .logo-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.3s, background 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255,255,255,0.08);
        }
        input::placeholder {
            color: var(--text-muted);
        }
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary {
            background: var(--gold);
            color: #000;
        }
        .btn-primary:hover {
            background: #c9a230;
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.6;
        }
        .error {
            background: rgba(231,76,60,0.1);
            border: 1px solid var(--red);
            color: #ff6b6b;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .success {
            background: rgba(39,174,96,0.1);
            border: 1px solid var(--green);
            color: #2ecc71;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
        }
        .footer-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }
        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="logo-section">
            <a href="index.html" class="logo-link">
                <div class="logo-text">TRADING <span>ELITE</span></div>
                <div class="logo-subtitle">Groupe Privé VIP</div>
            </a>
        </div>

        <h1>Crée ton compte</h1>
        <p class="subtitle">7 jours gratuits pour commencer</p>

        <form id="signupForm">
            <div id="errorMsg" class="error" style="display:none;"></div>
            <div id="successMsg" class="success" style="display:none;"></div>

            <div class="form-group">
                <label for="nom">Nom</label>
                <input type="text" id="nom" placeholder="Ton nom" required>
            </div>

            <div class="form-group">
                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" placeholder="Ton prénom" required>
            </div>

            <div class="form-group">
                <label for="telephone">Téléphone</label>
                <input type="tel" id="telephone" placeholder="0612345678" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="ton@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="Min 6 caractères" required>
            </div>

            <div class="form-group">
                <label for="parrain">Parrain (optionnel)</label>
                <input type="text" id="parrain" placeholder="Numéro de ton parrain">
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
                Créer mon compte
            </button>
        </form>

        <div class="footer-link">
            Tu as déjà un compte ? <a href="login.html">Se connecter</a>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdj78TKok5MVcUT5WtqCfCV_kZR7SJWxY",
  authDomain: "trading-elite.firebaseapp.com",
  projectId: "trading-elite",
  storageBucket: "trading-elite.firebasestorage.app",
  messagingSenderId: "261674541691",
  appId: "1:261674541691:web:27588043f232f8b152b8de"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form = document.getElementById("signupForm");
const errorMsg = document.getElementById("errorMsg");
const successMsg = document.getElementById("successMsg");
const submitBtn = document.getElementById("submitBtn");

function generateUserNumber() {
    return Math.floor(100000 + Math.random() * 900000);
}

function formatDate(date = new Date()) {
    const jour = String(date.getDate()).padStart(2, '0');
    const mois = String(date.getMonth() + 1).padStart(2, '0');
    const annee = date.getFullYear();
    return `${jour}/${mois}/${annee}`;
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const nom = document.getElementById("nom").value.trim();
    const prenom = document.getElementById("prenom").value.trim();
    const telephone = document.getElementById("telephone").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const parrain = document.getElementById("parrain").value.trim() || null;

    if (password.length < 6) {
        showError("Le mot de passe doit avoir au moins 6 caractères");
        return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Création en cours...";

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const userNumber = generateUserNumber();

        await addDoc(collection(db, "users"), {
            uid: user.uid,
            nom: nom,
            prenom: prenom,
            telephone: telephone,
            email: email,
            userNumber: userNumber,
            parrain: parrain,
            dateCreation: serverTimestamp(),
            semaineGratuite: true,
            dateSemaineGratuite: new Date(),
            abonne: false,
            dateAbonn: null,
            prixMensuel: 60,
            nombre_Filleul: 0
        });

        // Appliquer réduction au parrain si fourni (chercher par téléphone)
        if (parrain && parrain !== "") {
            try {
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("telephone", "==", parrain));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const parraindoc = querySnapshot.docs[0];
                    const currentPrice = parraindoc.data().prixMensuel || 60;
                    const currentFilleuls = parraindoc.data().nombre_Filleul || 0;

                    await updateDoc(parraindoc.ref, {
                        prixMensuel: Math.max(0, currentPrice - 15),
                        nombre_Filleul: currentFilleuls + 1
                    });
                    console.log("Réduction et filleul appliqués au parrain");
                } else {
                    console.warn("Parrain non trouvé avec téléphone:", parrain);
                }
            } catch (e) {
                console.error("Erreur application réduction:", e);
            }
        }

try {
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwitu4s2yYHMdOmOpJpivipGDV9pRo1pR8mro77JuLGUM25SGoscOgYjxZmhxvuxUY0/exec";
    const response = await fetch(GOOGLE_SHEET_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            nom: prenom + " " + nom,
            numero: userNumber,
            dateEntree: formatDate(),
            semaineGratuite: "Oui",
            invitePar: parrain || ""
        })
    });
    console.log("Google Sheets response:", response);
} catch (sheetError) {
    console.error("Erreur Google Sheets :", sheetError);
}

        showSuccess("Compte créé avec succès ! Redirection...");
        setTimeout(() => {
            window.location.href = "account.html";
        }, 2000);

    } catch (error) {
        console.error("Erreur complète :", error);

        let message = "Une erreur est survenue";

        if (error.code === "auth/email-already-in-use") {
            message = "Cet email est déjà utilisé";
        } else if (error.code === "auth/invalid-email") {
            message = "Email invalide";
        } else if (error.code === "auth/weak-password") {
            message = "Le mot de passe est trop faible";
        }

        showError(message);
        submitBtn.disabled = false;
        submitBtn.textContent = "Créer mon compte";
    }
});

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = "block";
    successMsg.style.display = "none";
}

function showSuccess(msg) {
    successMsg.textContent = msg;
    successMsg.style.display = "block";
    errorMsg.style.display = "none";
}
</script>

</body>
